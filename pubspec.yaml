name: walletmate
description: AI Powered Expense Tracker

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 날짜
  intl: ^0.20.2

  # 달력
  table_calendar: ^3.1.2

  # 그래프
  fl_chart: ^0.69.0

  # SQLite
  sqflite: ^2.4.1
  path: ^1.9.0

  # OCR
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.13.0

  # 로컬 저장
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - images/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true

  image_path: "images/app_icon.png"

  adaptive_icon_background: "#7C5CFF"
  adaptive_icon_foreground: "images/app_icon.png"

  remove_alpha_ios: true